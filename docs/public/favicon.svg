<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!--
    Transparent background — the amber/gold color reads clearly on both:
    - Light theme browser tabs (light gray/white strip)
    - Dark theme browser tabs (dark gray/black strip)
    Amber #f59e0b has ~7:1 contrast on white and ~3:1 on black — visible in both.
  -->

  <!-- Outer film reel ring -->
  <circle cx="32" cy="32" r="27" stroke="#fdf4e3" stroke-width="4" fill="none"/>

  <!-- Center hub -->
  <circle cx="32" cy="32" r="8" fill="#fdf4e3"/>
  <circle cx="32" cy="32" r="3.5" fill="#3b2f1e"/>

  <!-- 6 sprocket holes evenly around the ring (r=19 from centre) -->
  <circle cx="32"    cy="13"    r="3.5" fill="#fdf4e3"/>
  <circle cx="32"    cy="51"    r="3.5" fill="#fdf4e3"/>
  <circle cx="13"    cy="32"    r="3.5" fill="#fdf4e3"/>
  <circle cx="51"    cy="32"    r="3.5" fill="#fdf4e3"/>
  <circle cx="18.5"  cy="18.5"  r="3.5" fill="#fdf4e3"/>
  <circle cx="45.5"  cy="45.5"  r="3.5" fill="#fdf4e3"/>

  <!-- Play triangle (cutout effect inside hub) -->
  <polygon points="28,26 28,38 41,32" fill="#3b2f1e"/>
</svg>
